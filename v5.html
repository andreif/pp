                <span class="font-mono">Needed by</span> across roots.
                For a uv monorepo, the lockfile lists <span class="font-mono">[manifest].members</span> and multiple

                <span class="font-mono">workspace-uv.lock</span> in this repo.

    <script type="module">
        import * as Vue from 'vue';
        import { parse } from 'smol-toml';

        function normName(n) {
            return String(n ?? '').toLowerCase();
        }

        function pkgKey(p) {
            return `${normName(p.name)}@${p.version}`;
        }

        function wrKey(workspace, rootTitle) {
            return `${workspace}\0${rootTitle}`;
        }

        const WORKSPACE_EMOJI_POOL = [

                '☀', '🌤', '⛅', '🌥', '☁', '⛈', '🌧', '🌨', '❄', '☃', '⛄', '⚡', '💧', '🔥', '🌊',
                '🍀', '🌿', '🌱', '🌲', '🌳', '🌴', '🌵', '🍎', '🍊', '🍋', '🍌', '🍇', '🍓', '🫐', '🍒', '🍑',

                '🦐', '🦑', '🦪', '🐙', '🐚', '🐠', '🐟', '🐡', '🐬', '🐳', '🐋', '🦈', '🐊', '🐅', '🐆', '🦓',
                '🦍', '🦧', '🐘', '🦛', '🦏', '🐪', '🐫', '🦒', '🦘', '🦬', '🐃', '🐂', '🐄', '🐎', '🐖', '🐗',
                '🐏', '🐑', '🐐', '🐓', '🦃', '🦤', '🦚', '🦜', '🦢', '🦩', '🕊', '🐇', '🦝', '🦨', '🦡', '🦦',

        function assignWorkspaceAliases(rootGroups, subdependencyRows) {
            const seen = new Set();
            const pairs = [];
            function add(wr) {
                const k = wrKey(wr.workspace, wr.rootTitle);
                if (seen.has(k)) return;
                seen.add(k);
                pairs.push({ workspace: wr.workspace, rootTitle: wr.rootTitle, key: k });
            }
            for (const g of rootGroups) {
                for (const row of g.rows) {
                    for (const wr of row.workspaceRoots) add(wr);
                }
            }
            for (const row of subdependencyRows) {
                for (const wr of row.workspaceRoots) add(wr);
            }
            pairs.sort((a, b) => {
                const w = a.workspace.localeCompare(b.workspace);
                if (w !== 0) return w;
                return a.rootTitle.localeCompare(b.rootTitle);
            });
            const aliases = pairs.map((p, i) => ({
                ...p,
                emoji: WORKSPACE_EMOJI_POOL[i % WORKSPACE_EMOJI_POOL.length],
            }));
            const emojiByKey = new Map(aliases.map((a) => [a.key, a.emoji]));
            function enrich(wr) {
                return {
                    ...wr,
                    emoji: emojiByKey.get(wrKey(wr.workspace, wr.rootTitle)) ?? '?',
                };
            }
            for (const g of rootGroups) {
                for (const row of g.rows) {
                    row.workspaceRoots = row.workspaceRoots.map(enrich);
                }
            }
            for (const row of subdependencyRows) {
                row.workspaceRoots = row.workspaceRoots.map(enrich);
            }
            return aliases;
        }

        function isProjectRoot(p) {
            const s = p.source;
            return s && typeof s === 'object' && ('virtual' in s || 'editable' in s);
        }

        function formatSource(s) {
            if (!s || typeof s !== 'object') return '';
            if (s.registry != null) return String(s.registry);
            if (s.virtual != null) return `virtual ${s.virtual}`;
            if (s.editable != null) return `editable ${s.editable}`;
            return '';
        }

        function localPackageLabel(p) {
            if (!p || !p.source || typeof p.source !== 'object') return null;
            if (p.source.registry != null) return null;
            const t = formatSource(p.source);
            return t || null;
        }

        function workspaceLabelFromRoot(root) {
            const s = root.source;
            if (!s || typeof s !== 'object') return String(root.name ?? '');
            if (s.virtual != null) return String(s.virtual);
            if (s.editable != null) return String(s.editable);
            return String(root.name ?? '');
        }

        function buildForwardChildKeys(allPackages) {
            const forward = new Map();
            for (const p of allPackages) {
                const pk = pkgKey(p);
                const children = [];
                const deps = Array.isArray(p.dependencies) ? p.dependencies : [];
                for (const dep of deps) {
                    const { pkg: child } = resolvePkg(allPackages, dep);
                    if (child) children.push(pkgKey(child));
                }
                forward.set(pk, children);
            }
            return forward;
        }

        function buildReverseParents(forward) {
            const rev = new Map();
            for (const [parentKey, childKeys] of forward) {
                for (const ck of childKeys) {
                    if (!rev.has(ck)) rev.set(ck, new Set());
                    rev.get(ck).add(parentKey);
                }
            }
            return rev;
        }

        function reachableFrom(startKey, forward) {
            const seen = new Set();
            const stack = [startKey];
            seen.add(startKey);
            while (stack.length) {
                const k = stack.pop();
                for (const c of forward.get(k) || []) {
                    if (!seen.has(c)) {
                        seen.add(c);
                        stack.push(c);
                    }
                }
            }
            return seen;
        }

        function buildDepCountsByPkgKey(allPackages) {
            const forward = buildForwardChildKeys(allPackages);
            const m = new Map();
            for (const p of allPackages) {
                const pk = pkgKey(p);
                const reach = reachableFrom(pk, forward);
                const direct = forward.get(pk) || [];
                const directCount = direct.length;
                const totalBelow = reach.size - 1;
                m.set(pk, { directCount, subdepCount: totalBelow });
            }
            return m;
        }

        function directDepKeysForRoot(root, allPackages) {
            const keys = new Set();
            for (const dep of root.dependencies || []) {
                const { pkg } = resolvePkg(allPackages, dep);
                if (pkg) keys.add(pkgKey(pkg));
            }
            for (const dep of devDepsArray(root)) {
                const { pkg } = resolvePkg(allPackages, dep);
                if (pkg) keys.add(pkgKey(pkg));
            }
            return keys;
        }

        function buildSubdependencyRows(allPackages, roots, manifestMap, byParentSpecs, depCountsByPkgKey) {
            if (!Array.isArray(roots) || !roots.length) return [];
            const forward = buildForwardChildKeys(allPackages);
            const reverse = buildReverseParents(forward);
            const keyToPkg = new Map(allPackages.map((p) => [pkgKey(p), p]));
            const bySubKey = new Map();
            for (const root of roots) {
                const rk = pkgKey(root);
                const reachable = reachableFrom(rk, forward);
                const direct = directDepKeysForRoot(root, allPackages);
                const workspace = workspaceLabelFromRoot(root);
                const rootTitle = `${root.name}@${root.version}`;
                for (const subKey of reachable) {
                    if (subKey === rk || direct.has(subKey)) continue;
                    const sp = keyToPkg.get(subKey);
                    const pkgName = sp ? sp.name : subKey.split('@')[0] || subKey;
                    const parents = reverse.get(subKey);
                    const parentLabels = [];
                    const specParts = [];
                    if (parents) {
                        for (const pk of parents) {
                            if (!reachable.has(pk)) continue;
                            const pp = keyToPkg.get(pk);
                            if (!pp) continue;
                            parentLabels.push(`${pp.name}@${pp.version}`);
                            const spec = metadataSpecifierForDependency(pkgName, pp, byParentSpecs);
                            if (spec) specParts.push(spec);
                        }
                    }
                    const manifestConstraints = manifestSpecifiersFor(pkgName, manifestMap);
                    const osvEligible = Boolean(sp && isOsvPyPI(sp));
                    const osvPkgId = osvEligible && sp ? pkgKey(sp) : null;
                    const localSourceLabel = sp ? localPackageLabel(sp) : null;
                    let agg = bySubKey.get(subKey);
                    if (!agg) {
                        agg = {
                            key: subKey,
                            packageName: pkgName,
                            packageVersion: sp ? sp.version : '',
                            workspaceRoots: [],
                            seenWorkspaceRoot: new Set(),
                            specifierParts: new Set(),
                            manifestConstraints: manifestConstraints || null,
                            neededByParents: new Set(),
                            osvEligible,
                            osvPkgId,
                            localSourceLabel,
                        };
                        bySubKey.set(subKey, agg);
                    }
                    const wrKey = `${workspace}\0${rootTitle}`;
                    if (!agg.seenWorkspaceRoot.has(wrKey)) {
                        agg.seenWorkspaceRoot.add(wrKey);
                        agg.workspaceRoots.push({ workspace, rootTitle });
                    }
                    for (const s of specParts) agg.specifierParts.add(s);
                    for (const p of parentLabels) agg.neededByParents.add(p);
                }
            }
            const rows = [];
            for (const agg of bySubKey.values()) {
                agg.workspaceRoots.sort((a, b) => {
                    const w = a.workspace.localeCompare(b.workspace);
                    if (w !== 0) return w;
                    return a.rootTitle.localeCompare(b.rootTitle);
                });
                const specifier =
                    agg.specifierParts.size > 0
                        ? [...agg.specifierParts].sort().join(', ')
                        : null;
                const cnt = depCountsByPkgKey ? depCountsByPkgKey.get(agg.key) : null;
                rows.push({
                    key: agg.key,
                    packageName: agg.packageName,
                    packageVersion: agg.packageVersion,
                    workspaceRoots: agg.workspaceRoots,
                    specifier,
                    manifestConstraints: agg.manifestConstraints,
                    neededBy: agg.neededByParents.size
                        ? [...agg.neededByParents].sort().join(', ')
                        : '-',
                    osvEligible: agg.osvEligible,
                    osvPkgId: agg.osvPkgId,
                    localSourceLabel: agg.localSourceLabel,
                    directDepCount: cnt ? cnt.directCount : null,
                    subdepCount: cnt ? cnt.subdepCount : null,
                });
            }
            rows.sort((a, b) => {
                const n = normName(a.packageName).localeCompare(normName(b.packageName));
                if (n !== 0) return n;
                return String(a.packageVersion).localeCompare(String(b.packageVersion));
            });
            return rows;
        }

        function normPypiName(n) {
            return String(n ?? '')
                .toLowerCase()
                .replace(/[-_.]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function osvPyPIListUrl(pkgName) {
            const q = encodeURIComponent(normPypiName(pkgName));
            return `https://osv.dev/list?ecosystem=PyPI&q=${q}`;
        }

        function cveNvdUrl(id) {
            if (!id || typeof id !== 'string') return null;
            const m = id.trim().match(/^CVE-\d{4}-\d+/i);
            if (!m) return null;
            const cve = m[0].toUpperCase();
            return `https://nvd.nist.gov/vuln/detail/${encodeURIComponent(cve)}`;
        }

        function ghsaAdvisoryUrl(id) {
            if (!id || typeof id !== 'string') return null;
            const m = id.trim().match(/^GHSA-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}$/i);
            if (!m) return null;
            const ghsa = m[0].toUpperCase();
            return `https://github.com/advisories/${encodeURIComponent(ghsa)}`;
        }

        const OSV_UNKNOWN_SEVERITY_SCORE = 5;

        function cvssV3BaseScoreFromVector(vector) {
            if (!vector || typeof vector !== 'string' || !vector.startsWith('CVSS:3')) {
                return null;
            }
            const m = {};
            for (const part of vector.split('/')) {
                const c = part.indexOf(':');
                if (c <= 0) continue;
                const k = part.slice(0, c);
                const v = part.slice(c + 1);
                if (k !== 'CVSS') m[k] = v;
            }
            if (!m.AV || !m.AC || !m.PR || !m.UI || !m.S || m.C == null || m.I == null || m.A == null) {
                return null;
            }
            const av = { N: 0.85, A: 0.62, L: 0.55, P: 0.2 }[m.AV];
            const ac = { L: 0.77, H: 0.44 }[m.AC];
            const pr =
                m.S === 'U'
                    ? { N: 0.85, L: 0.62, H: 0.27 }[m.PR]
                    : { N: 0.85, L: 0.68, H: 0.5 }[m.PR];
            const ui = { N: 0.85, R: 0.56 }[m.UI];
            const c = { N: 0, L: 0.22, H: 0.56 }[m.C];
            const ii = { N: 0, L: 0.22, H: 0.56 }[m.I];
            const a = { N: 0, L: 0.22, H: 0.56 }[m.A];
            if ([av, ac, pr, ui, c, ii, a].some((x) => x == null)) return null;
            const iss = 1 - (1 - c) * (1 - ii) * (1 - a);
            let impact;
            if (m.S === 'U') {
                impact = 6.42 * iss;
            } else {
                impact = 7.52 * (iss - 0.029) - 3.25 * (iss - 0.02) ** 15;
            }
            if (impact <= 0) return 0;
            const exploitability = 8.22 * av * ac * pr * ui;
            const base =
                m.S === 'U'
                    ? Math.min(impact + exploitability, 10)
                    : Math.min(1.08 * (impact + exploitability), 10);
            return Math.round(base * 10) / 10;
        }

        function severityLabelToScore(label) {
            if (!label || typeof label !== 'string') return null;
            const u = label.trim().toUpperCase();
            const map = {
                CRITICAL: 9.5,
                HIGH: 7.5,
                MODERATE: 5.5,
                MEDIUM: 5.5,
                LOW: 2.5,
            };
            return map[u] ?? null;
        }

        function severityScoreFromOsvVulnRecord(v) {
            if (!v || typeof v !== 'object') return null;
            let best = null;
            const bump = (x) => {
                if (x != null && !Number.isNaN(x)) {
                    best = best == null ? x : Math.max(best, x);
                }
            };
            const ds = v.database_specific;
            if (ds && typeof ds === 'object' && typeof ds.severity === 'string') {
                bump(severityLabelToScore(ds.severity));
            }
            const sev = v.severity;
            if (Array.isArray(sev)) {
                for (const s of sev) {
                    if (!s || typeof s !== 'object' || s.type !== 'CVSS_V3' || typeof s.score !== 'string') {
                        continue;
                    }
                    bump(cvssV3BaseScoreFromVector(s.score));
                }
            }
            const aff = v.affected;
            if (Array.isArray(aff)) {
                for (const a of aff) {
                    if (!a || typeof a !== 'object') continue;
                    const es = a.ecosystem_specific;
                    if (es && typeof es === 'object' && typeof es.severity === 'string') {
                        bump(severityLabelToScore(es.severity));
                    }
                }
            }
            return best;
        }

        function vulnSeverityClass(score) {
            if (score == null) return 'text-zinc-400';
            if (score >= 9) return 'text-rose-400 font-semibold';
            if (score >= 7) return 'text-orange-400';
            if (score >= 4) return 'text-amber-400';
            return 'text-gray-400';
        }

        function isOsvPyPI(p) {
            if (!p || isProjectRoot(p)) return false;
            const s = p.source;
            if (!s || typeof s !== 'object' || s.registry == null) return false;
            return Boolean(p.name && p.version);
        }

        function stringMentionsCve(s) {
            return typeof s === 'string' && /CVE-\d{4}-\d+/i.test(s);
        }

        function hasCveId(ids) {
            if (!ids || !ids.length) return false;
            return ids.some((id) => typeof id === 'string' && stringMentionsCve(id.trim()));
        }

        function osvRecordMentionsCve(data) {
            if (!data || typeof data !== 'object') return false;
            const parts = [];
            if (data.id != null) parts.push(String(data.id));
            if (Array.isArray(data.aliases)) {
                for (const a of data.aliases) {
                    if (a != null) parts.push(String(a));
                }
            }
            return parts.some((s) => stringMentionsCve(s));
        }

        function cveIdsFromOsvRecord(data) {
            if (!data || typeof data !== 'object') return [];
            const out = new Set();
            const push = (s) => {
                if (typeof s !== 'string') return;
                const m = s.match(/\bCVE-\d{4}-\d+\b/gi);
                if (m) {
                    for (const x of m) out.add(x.toUpperCase());
                }
            };
            push(data.id);
            if (Array.isArray(data.aliases)) {
                for (const a of data.aliases) {
                    push(a);
                }
            }
            return [...out].sort();
        }

        function pypiFixedVersionsByNormNameFromOsv(data) {
            if (!data || typeof data !== 'object') return {};
            const aff = data.affected;
            if (!Array.isArray(aff)) return {};
            const byNorm = {};
            for (const a of aff) {
                const pkg = a.package;
                if (!pkg || typeof pkg !== 'object') continue;
                if (pkg.ecosystem !== 'PyPI' || pkg.name == null) continue;
                const nk = normPypiName(pkg.name);
                const ranges = a.ranges;
                if (!Array.isArray(ranges)) continue;
                for (const r of ranges) {
                    if (!r || r.type !== 'ECOSYSTEM') continue;
                    const ev = r.events;
                    if (!Array.isArray(ev)) continue;
                    for (const e of ev) {
                        if (!e || e.fixed == null) continue;
                        const fv = String(e.fixed).trim();
                        if (!fv) continue;
                        if (!byNorm[nk]) byNorm[nk] = new Set();
                        byNorm[nk].add(fv);
                    }
                }
            }
            const out = {};
            for (const [k, set] of Object.entries(byNorm)) {
                out[k] = [...set].sort(cmpSemver);
            }
            return out;
        }

        function manifestSpecifiersFor(depName, manifestMap) {
            if (!manifestMap || !depName) return null;
            const arr = manifestMap.get(normName(depName));
            if (!arr || !arr.length) return null;
            return arr.join(', ');
        }

        function collectParentSpecifiersByPackage(packages) {
            const byParent = new Map();
            if (!Array.isArray(packages)) return byParent;
            for (const pkg of packages) {
                const md = pkg.metadata;
                if (!md || typeof md !== 'object') continue;
                const acc = new Map();
                function addRow(row) {
                    if (!row || typeof row !== 'object') return;
                    const n = row.name;
                    if (n == null) return;
                    const spec = row.specifier != null ? String(row.specifier).trim() : '';
                    if (!spec) return;
                    const k = normName(n);
                    if (!acc.has(k)) acc.set(k, []);
                    acc.get(k).push(spec);
                }
                function addArray(arr) {
                    if (!Array.isArray(arr)) return;
                    for (const row of arr) addRow(row);
                }
                addArray(md['requires-dist']);
                const reqDev = md['requires-dev'];
                if (reqDev && typeof reqDev === 'object') {
                    if (Array.isArray(reqDev.dev)) addArray(reqDev.dev);
                }
                if (!acc.size) continue;
                const flat = new Map();
                acc.forEach((specs, k) => {
                    flat.set(k, [...new Set(specs)].join(', '));
                });
                byParent.set(pkgKey(pkg), flat);
            }
            return byParent;
        }

        function metadataSpecifierForDependency(depName, parentPkg, byParentSpecs) {
            if (!parentPkg || !byParentSpecs) return null;
            const inner = byParentSpecs.get(pkgKey(parentPkg));
            if (!inner) return null;
            const s = inner.get(normName(depName));
            return s ? String(s) : null;
        }

        function collectManifestConstraints(data) {
            const m = new Map();
            const man = data.manifest;
            if (!man || typeof man !== 'object') return m;
            const constraints = man.constraints;
            if (!Array.isArray(constraints)) return m;
            for (const c of constraints) {
                if (!c || typeof c !== 'object') continue;
                const n = c.name;
                if (n == null) continue;
                const spec = c.specifier != null ? String(c.specifier).trim() : '';
                const k = normName(n);
                if (!m.has(k)) m.set(k, []);
                if (spec) m.get(k).push(spec);
            }
            return m;
        }

        function cmpSemver(a, b) {
            const pa = String(a).split('.').map((x) => parseInt(x, 10) || 0);
            const pb = String(b).split('.').map((x) => parseInt(x, 10) || 0);
            const n = Math.max(pa.length, pb.length);
            for (let i = 0; i < n; i += 1) {
                const x = pa[i] ?? 0;
                const y = pb[i] ?? 0;
                if (x < y) return -1;
                if (x > y) return 1;
            }
            return 0;
        }

        function resolvePkg(all, dep) {
            const n = normName(dep.name);
            const candidates = all.filter((p) => normName(p.name) === n);
            if (candidates.length === 0) return { pkg: null, ambiguous: false };
            if (dep.version) {
                const hit = candidates.find((p) => p.version === dep.version);
                return { pkg: hit ?? null, ambiguous: false };
            }
            if (candidates.length === 1) return { pkg: candidates[0], ambiguous: false };
            if (dep.source != null) {
                const want = JSON.stringify(dep.source);
                const hit = candidates.find((p) => JSON.stringify(p.source) === want);
                if (hit) return { pkg: hit, ambiguous: false };
            }
            const sorted = [...candidates].sort((a, b) => cmpSemver(b.version, a.version));
            return { pkg: sorted[0], ambiguous: true };
        }

        function normalizeDepExtras(ex) {
            if (ex == null) return null;
            if (Array.isArray(ex) && ex.length) return ex.map((e) => String(e));
            return null;
        }

        function depRowsForList(deps, rootPkg, manifestMap, byParentSpecs, allPackages, kind, depCountsByPkgKey) {
            if (!Array.isArray(deps) || !deps.length) return [];
            const workspace = workspaceLabelFromRoot(rootPkg);
            const rootTitle = `${rootPkg.name}@${rootPkg.version}`;
            const rows = [];
            for (const dep of deps) {
                if (!dep || dep.name == null) continue;
                const name = String(dep.name);
                const { pkg: child, ambiguous } = resolvePkg(allPackages, dep);
                const cnt = child && depCountsByPkgKey ? depCountsByPkgKey.get(pkgKey(child)) : null;
                const metaSpec = metadataSpecifierForDependency(name, rootPkg, byParentSpecs);
                const manSpec = manifestSpecifiersFor(name, manifestMap);
                const extras = normalizeDepExtras(dep.extra);
                const extrasLabel =
                    extras && extras.length ? `[${extras.join(', ')}]` : '';
                const marker = dep.marker != null ? String(dep.marker) : '';
                const markerShort =
                    marker.length > 64 ? `${marker.slice(0, 62)}...` : marker;
                const mergeKey = `${kind}:${name}:${extrasLabel}:${marker}`;
                const osvEligible = Boolean(child && isOsvPyPI(child));
                const osvPkgId = osvEligible && child ? pkgKey(child) : null;
                const localSourceLabel = child ? localPackageLabel(child) : null;
                rows.push({
                    mergeKey,
                    key: mergeKey,
                    name,
                    extrasLabel,
                    markerShort: markerShort || null,
                    specifier: metaSpec || null,
                    manifestConstraints: manSpec || null,
                    resolved: child ? child.version : null,
                    ambiguous,
                    osvEligible,
                    osvPkgId,
                    localSourceLabel,
                    workspaceRoot: { workspace, rootTitle },
                    directDepCount: cnt ? cnt.directCount : null,
                    subdepCount: cnt ? cnt.subdepCount : null,
                });
            }
            rows.sort((a, b) => normName(a.name).localeCompare(normName(b.name)));
            return rows;
        }

        function collapseDirectDepRows(rows) {
            const map = new Map();
            for (const row of rows) {
                const k = row.mergeKey;
                if (!map.has(k)) {
                    const { workspaceRoot, mergeKey, ...base } = row;
                    const agg = {
                        ...base,
                        key: mergeKey,
                        workspaceRoots: [workspaceRoot],
                        seenWr: new Set([`${workspaceRoot.workspace}\0${workspaceRoot.rootTitle}`]),
                        specifierParts: new Set(),
                    };
                    if (row.specifier) agg.specifierParts.add(row.specifier);
                    map.set(k, agg);
                } else {
                    const agg = map.get(k);
                    const wrKey = `${row.workspaceRoot.workspace}\0${row.workspaceRoot.rootTitle}`;
                    if (!agg.seenWr.has(wrKey)) {
                        agg.seenWr.add(wrKey);
                        agg.workspaceRoots.push(row.workspaceRoot);
                    }
                    if (row.specifier) agg.specifierParts.add(row.specifier);
                    agg.ambiguous = agg.ambiguous || row.ambiguous;
                }
            }
            const out = [];
            for (const agg of map.values()) {
                agg.workspaceRoots.sort((a, b) => {
                    const w = a.workspace.localeCompare(b.workspace);
                    if (w !== 0) return w;
                    return a.rootTitle.localeCompare(b.rootTitle);
                });
                agg.specifier = agg.specifierParts.size ? [...agg.specifierParts].sort().join(', ') : null;
                delete agg.specifierParts;
                delete agg.seenWr;
                delete agg.mergeKey;
                out.push(agg);
            }
            out.sort((a, b) => normName(a.name).localeCompare(normName(b.name)));
            return out;
        }

        function devDepsArray(rootPkg) {
            const dd = rootPkg['dev-dependencies'];
            if (!dd || typeof dd !== 'object') return [];
            const dev = dd.dev;
            return Array.isArray(dev) ? dev : [];
        }

        function buildCollapsedRootGroups(rootPkgs, manifestMap, byParentSpecs, allPackages, depCountsByPkgKey) {
            if (!Array.isArray(rootPkgs) || !rootPkgs.length) return [];
            const prodFlat = [];
            const devFlat = [];
            for (const root of rootPkgs) {
                prodFlat.push(
                    ...depRowsForList(
                        root.dependencies,
                        root,
                        manifestMap,
                        byParentSpecs,
                        allPackages,
                        'prod',
                        depCountsByPkgKey,
                    ),
                );
                devFlat.push(
                    ...depRowsForList(
                        devDepsArray(root),
                        root,
                        manifestMap,
                        byParentSpecs,
                        allPackages,
                        'dev',
                        depCountsByPkgKey,
                    ),
                );
            }
            const groups = [];
            const prodCollapsed = collapseDirectDepRows(prodFlat);
            if (prodCollapsed.length) groups.push({ label: 'Dependencies', rows: prodCollapsed });
            const devCollapsed = collapseDirectDepRows(devFlat);
            if (devCollapsed.length) groups.push({ label: 'Dev dependencies', rows: devCollapsed });
            return groups;
        }

        const UvLockRoots = {
            template: '#uv-roots-tpl',
            setup() {
                const dragOver = Vue.ref(false);
                const fileLabel = Vue.ref('');
                const parseError = Vue.ref('');
                const metaLines = Vue.ref([]);
                const parsed = Vue.ref(false);
                const rootGroups = Vue.ref([]);
                const projectRootsCount = Vue.ref(0);
                const workspaceAliases = Vue.ref([]);
                const subdependencyRows = Vue.ref([]);
                const vulnIdsByPkgId = Vue.ref({});
                const vulnIdHasCveFromDetails = Vue.ref({});
                const vulnCveIdsByVulnId = Vue.ref({});
                const vulnPypiFixesByVulnId = Vue.ref({});
                const vulnScoreByVulnId = Vue.ref({});
                const osvScanning = Vue.ref(false);
                const osvScanError = Vue.ref('');
                const metaLine = Vue.computed(() => metaLines.value.length > 0);

                async function runOsvScan() {
                    const groups = rootGroups.value;
                    const sliceInputs = [];
                    const seen = new Set();
                    function pushOsvRow(row, name, version) {
                        if (!row.osvEligible || !version || !row.osvPkgId) return;
                        if (seen.has(row.osvPkgId)) return;
                        seen.add(row.osvPkgId);
                        sliceInputs.push({
                            id: row.osvPkgId,
                            query: {
                                package: { name: normPypiName(name), ecosystem: 'PyPI' },
                                version: String(version),
                            },
                        });
                    }
                    for (const g of groups) {
                        for (const row of g.rows) {
                            pushOsvRow(row, row.name, row.resolved);
                        }
                    }
                    for (const row of subdependencyRows.value) {
                        pushOsvRow(row, row.packageName, row.packageVersion);
                    }
                    if (!sliceInputs.length) {
                        vulnIdsByPkgId.value = {};
                        vulnIdHasCveFromDetails.value = {};
                        vulnCveIdsByVulnId.value = {};
                        vulnPypiFixesByVulnId.value = {};
                        vulnScoreByVulnId.value = {};
                        osvScanError.value = '';
                        osvScanning.value = false;
                        return;
                    }
                    osvScanning.value = true;
                    osvScanError.value = '';
                    const nextIds = {};
                    const chunk = 500;
                    try {
                        for (let i = 0; i < sliceInputs.length; i += chunk) {
                            const slice = sliceInputs.slice(i, i + chunk);
                            const res = await fetch('https://api.osv.dev/v1/querybatch', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    queries: slice.map((s) => s.query),
                                }),
                            });
                            if (!res.ok) {
                                throw new Error(`OSV HTTP ${res.status}`);
                            }
                            const data = await res.json();
                            const results = Array.isArray(data.results) ? data.results : [];
                            for (let j = 0; j < slice.length; j++) {
                                const row = results[j];
                                const ids =
                                    row && row.vulns && Array.isArray(row.vulns)
                                        ? row.vulns.map((v) => v.id).filter(Boolean)
                                        : [];
                                if (ids.length) {
                                    nextIds[slice[j].id] = ids;
                                }
                            }
                        }
                        const uniqueVulnIds = [...new Set(Object.values(nextIds).flat())];
                        const scoreByVulnId = {};
                        const detailCveByVulnId = {};
                        const detailCveIdsByVulnId = {};
                        const detailPypiFixesByVulnId = {};
                        const detailChunk = 50;
                        for (let i = 0; i < uniqueVulnIds.length; i += detailChunk) {
                            const part = uniqueVulnIds.slice(i, i + detailChunk);
                            await Promise.all(
                                part.map(async (vid) => {
                                    try {
                                        const r = await fetch(
                                            `https://api.osv.dev/v1/vulns/${encodeURIComponent(vid)}`,
                                        );
                                        if (!r.ok) {
                                            scoreByVulnId[vid] = OSV_UNKNOWN_SEVERITY_SCORE;
                                            detailCveByVulnId[vid] = stringMentionsCve(vid);
                                            detailCveIdsByVulnId[vid] = cveIdsFromOsvRecord({
                                                id: vid,
                                                aliases: [],
                                            });
                                            detailPypiFixesByVulnId[vid] = {};
                                            return;
                                        }
                                        const data = await r.json();
                                        const sc = severityScoreFromOsvVulnRecord(data);
                                        scoreByVulnId[vid] =
                                            sc != null ? sc : OSV_UNKNOWN_SEVERITY_SCORE;
                                        detailCveByVulnId[vid] =
                                            stringMentionsCve(vid) || osvRecordMentionsCve(data);
                                        detailCveIdsByVulnId[vid] = cveIdsFromOsvRecord(data);
                                        detailPypiFixesByVulnId[vid] =
                                            pypiFixedVersionsByNormNameFromOsv(data);
                                    } catch {
                                        scoreByVulnId[vid] = OSV_UNKNOWN_SEVERITY_SCORE;
                                        detailCveByVulnId[vid] = stringMentionsCve(vid);
                                        detailCveIdsByVulnId[vid] = cveIdsFromOsvRecord({
                                            id: vid,
                                            aliases: [],
                                        });
                                        detailPypiFixesByVulnId[vid] = {};
                                    }
                                }),
                            );
                        }
                        vulnIdsByPkgId.value = nextIds;
                        vulnIdHasCveFromDetails.value = detailCveByVulnId;
                        vulnCveIdsByVulnId.value = detailCveIdsByVulnId;
                        vulnPypiFixesByVulnId.value = detailPypiFixesByVulnId;
                        vulnScoreByVulnId.value = scoreByVulnId;
                    } catch (err) {
                        osvScanError.value = err.message || String(err);
                        vulnIdsByPkgId.value = {};
                        vulnIdHasCveFromDetails.value = {};
                        vulnCveIdsByVulnId.value = {};
                        vulnPypiFixesByVulnId.value = {};
                        vulnScoreByVulnId.value = {};
                    } finally {
                        osvScanning.value = false;
                    }
                }

                function vulnIdsForRow(row) {
                    const id = row.osvPkgId;
                    if (!id) return null;
                    return vulnIdsByPkgId.value[id] ?? null;
                }

                function vulnScoreForVulnId(vid) {
                    if (vid == null || typeof vid !== 'string') return OSV_UNKNOWN_SEVERITY_SCORE;
                    const m = vulnScoreByVulnId.value;
                    if (!m || typeof m !== 'object') return OSV_UNKNOWN_SEVERITY_SCORE;
                    const s = m[vid];
                    return s != null ? s : OSV_UNKNOWN_SEVERITY_SCORE;
                }

                function vulnAdvisoryGroupsForRow(row) {
                    const ids = vulnIdsForRow(row);
                    if (!ids || !ids.length) return [];
                    const map = vulnCveIdsByVulnId.value;
                    const fixMap = vulnPypiFixesByVulnId.value;
                    const pkg = row.name != null ? row.name : row.packageName;
                    const nk = pkg ? normPypiName(pkg) : '';
                    return ids.map((vid) => {
                        const raw = map && map[vid];
                        let cves = Array.isArray(raw) ? [...raw].sort() : [];
                        cves = cves.filter((c) => c !== vid);
                        let patched = [];
                        if (nk && fixMap && typeof fixMap === 'object') {
                            const per = fixMap[vid];
                            if (per && typeof per === 'object' && Array.isArray(per[nk])) {
                                patched = per[nk];
                            }
                        }
                        return { vid, cves, patched };
                    });
                }

                function advisoryCveFallbackLine(row, vid) {
                    const m = vulnIdHasCveFromDetails.value;
                    if (!m || typeof m !== 'object' || m[vid] !== true) return false;
                    const arr = vulnCveIdsByVulnId.value && vulnCveIdsByVulnId.value[vid];
                    return !Array.isArray(arr) || arr.length === 0;
                }

                function vulnScoreTitleForVulnId(vid) {
                    return `OSV ~${vulnScoreForVulnId(vid).toFixed(1)}/10`;
                }

                function rowMentionsCve(row) {
                    if (!row.osvEligible) return false;
                    const ids = vulnIdsForRow(row);
                    if (!ids || !ids.length) return false;
                    if (hasCveId(ids)) return true;
                    const map = vulnIdHasCveFromDetails.value;
                    if (!map || typeof map !== 'object') return false;
                    return ids.some((vid) => map[vid] === true);
                }

                const showOnlyCve = Vue.ref(false);

                const rootGroupsFiltered = Vue.computed(() => {
                    const src = rootGroups.value;
                    if (!showOnlyCve.value) return src;
                    return src
                        .map((g) => ({
                            label: g.label,
                            rows: g.rows.filter((row) => rowMentionsCve(row)),
                        }))
                        .filter((g) => g.rows.length > 0);
                });

                const subdependencyRowsFiltered = Vue.computed(() => {
                    const src = subdependencyRows.value;
                    if (!showOnlyCve.value) return src;
                    return src.filter((row) => rowMentionsCve(row));
                });

                function applyLockText(text, name) {
                    parseError.value = '';
                    rootGroups.value = [];
                    projectRootsCount.value = 0;
                    workspaceAliases.value = [];
                    subdependencyRows.value = [];
                    metaLines.value = [];
                    parsed.value = false;
                    vulnIdsByPkgId.value = {};
                    vulnIdHasCveFromDetails.value = {};
                    vulnCveIdsByVulnId.value = {};
                    vulnPypiFixesByVulnId.value = {};
                    vulnScoreByVulnId.value = {};
                    osvScanError.value = '';
                    osvScanning.value = false;
                    showOnlyCve.value = false;
                    try {
                        const data = parse(text);
                        parsed.value = true;
                        const packages = Array.isArray(data.package) ? data.package : [];
                        const mc = collectManifestConstraints(data);
                        const manifestMap = mc.size ? mc : null;
                        const pb = collectParentSpecifiersByPackage(packages);
                        const byParentSpecs = pb.size ? pb : null;
                        const lines = [];
                        if (data['requires-python'] != null) {
                            lines.push(`requires-python: ${data['requires-python']}`);
                        }
                        if (data.version != null) lines.push(`lock version: ${data.version}`);
                        if (data.revision != null) lines.push(`revision: ${data.revision}`);
                        lines.push(`packages: ${packages.length}`);
                        if (mc.size) {
                            let n = 0;
                            mc.forEach((specs) => {
                                n += specs.length;
                            });
                            lines.push(`manifest constraints: ${n} (unique packages: ${mc.size})`);
                        }
                        const man = data.manifest;
                        if (man && typeof man === 'object' && Array.isArray(man.members) && man.members.length) {
                            lines.push(`workspace members: ${man.members.join(', ')}`);
                        }
                        metaLines.value = lines;
                        const roots = packages.filter(isProjectRoot);
                        projectRootsCount.value = roots.length;
                        const depCountsByPkgKey = buildDepCountsByPkgKey(packages);
                        const rg = buildCollapsedRootGroups(
                            roots,
                            manifestMap,
                            byParentSpecs,
                            packages,
                            depCountsByPkgKey,
                        );
                        const sub = buildSubdependencyRows(
                            packages,
                            roots,
                            manifestMap,
                            byParentSpecs,
                            depCountsByPkgKey,
                        );
                        workspaceAliases.value = assignWorkspaceAliases(rg, sub);
                        rootGroups.value = rg;
                        subdependencyRows.value = sub;
                        Vue.nextTick(() => {
                            void runOsvScan();
                        });
                    } catch (err) {
                        parseError.value = err.message || String(err);
                        parsed.value = false;
                        rootGroups.value = [];
                        projectRootsCount.value = 0;
                        workspaceAliases.value = [];
                        subdependencyRows.value = [];
                        vulnIdsByPkgId.value = {};
                        vulnIdHasCveFromDetails.value = {};
                        vulnCveIdsByVulnId.value = {};
                        vulnPypiFixesByVulnId.value = {};
                        vulnScoreByVulnId.value = {};
                    }
                    if (name) fileLabel.value = name;
                }

                const onFile = (e) => {
                    const f = e.target.files && e.target.files[0];
                    if (!f) return;
                    const reader = new FileReader();
                    reader.onload = () => applyLockText(String(reader.result || ''), f.name);
                    reader.onerror = () => {
                        parseError.value = 'Could not read file.';
                        parsed.value = false;
                    };
                    reader.readAsText(f, 'utf-8');
                };

                const onDrop = (e) => {
                    dragOver.value = false;
                    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
                    if (!f) return;
                    const reader = new FileReader();
                    reader.onload = () => applyLockText(String(reader.result || ''), f.name);
                    reader.onerror = () => {
                        parseError.value = 'Could not read file.';
                        parsed.value = false;
                    };
                    reader.readAsText(f, 'utf-8');
                };

                return {
                    dragOver,
                    fileLabel,
                    parseError,
                    metaLines,
                    metaLine,
                    parsed,
                    rootGroups,
                    rootGroupsFiltered,
                    projectRootsCount,
                    workspaceAliases,
                    subdependencyRows,
                    subdependencyRowsFiltered,
                    showOnlyCve,
                    onFile,
                    onDrop,
                    osvScanning,
                    osvScanError,
                    vulnIdsForRow,
                    vulnAdvisoryGroupsForRow,
                    advisoryCveFallbackLine,
                    vulnScoreForVulnId,
                    vulnScoreTitleForVulnId,
                    vulnSeverityClass,
                    hasCveId,
                    rowMentionsCve,
                    osvPyPIListUrl,
                    cveNvdUrl,
                    ghsaAdvisoryUrl,
                };
            },
        };

        const app = Vue.createApp({});
        app.component('uv-lock-roots', UvLockRoots);
        app.mount('#app');
    </script>
</body>
</html>
