<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>uv.lock dependency graph</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (location.protocol === 'https:') {
            const t = parseInt(location.search.slice(1)) || 0;
            const n = new Date().getTime();
            if (n - t > 60 * 5 * 1000) {
                location.href = location.pathname + '?' + n + location.hash;
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-950 p-2 lg:p-8 lg:px-24 text-gray-300 min-h-screen">
    <div id="app">
        <uv-lock-graph></uv-lock-graph>
    </div>
    <script type="importmap">{"imports": {
      "vue": "https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.js",
      "smol-toml": "./vendor/smol-toml-1.6.1/dist/index.js",
      "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
    }}</script>

    <script type="text/x-template" id="uv-graph-root-tpl">
        <div>
            <h1 class="text-3xl pb-4 font-black">uv.lock dependency graph</h1>
            <p class="text-sm text-gray-500 max-w-2xl pb-6">
                Load a <span class="font-mono text-indigo-300/90">uv.lock</span> file. The graph is the union of dependency trees from project roots
                (<span class="font-mono">source</span> is <span class="font-mono">virtual</span> or <span class="font-mono">editable</span>), with shared packages merged into one node.
                Layout is radial by depth (depth 1 on one ring; deeper rings place each node in a small arc around its parent so edges stay local). Use <span class="font-mono">Ring spacing</span> to scale how far rings sit from the center. Zoom and pan with the mouse.
                Edge labels use each parent&apos;s <span class="font-mono">requires-dist</span> / <span class="font-mono">requires-dev</span> specifier when uv wrote it; otherwise the resolved <span class="font-mono">==</span> pin. <span class="font-mono">[manifest].constraints</span> (uv) are shown under the node&apos;s resolved version, not on edges.
            </p>

            <div class="rounded-lg border border-indigo-800/80 bg-indigo-900/40 p-4 mb-6 max-w-3xl space-y-4">
                <h2 class="text-lg font-semibold text-indigo-200">Lockfile</h2>
                <label
                    class="flex flex-col gap-2 cursor-pointer rounded-md border border-dashed border-indigo-700/60 bg-indigo-950/30 p-4 transition-colors hover:border-indigo-500/50"
                    :class="dragOver ? 'border-teal-500/70 bg-indigo-900/50' : ''"
                    @dragover.prevent="dragOver = true"
                    @dragleave.prevent="dragOver = false"
                    @drop.prevent="onDrop"
                >
                    <span class="text-xs text-gray-500">Choose or drop <span class="font-mono">uv.lock</span></span>
                    <input
                        type="file"
                        accept=".lock,text/plain"
                        class="text-sm file:mr-3 file:rounded-md file:border-0 file:bg-indigo-700 file:px-3 file:py-1.5 file:text-sm file:text-white hover:file:bg-indigo-600"
                        @change="onFile"
                    />
                </label>
                <p v-if="fileLabel" class="text-xs font-mono text-indigo-200/90">{{ fileLabel }}</p>
                <p v-if="parseError" class="text-sm text-amber-400">{{ parseError }}</p>
                <div v-if="metaLine" class="text-xs text-gray-500 font-mono space-y-1">
                    <p v-for="(line, i) in metaLines" :key="i">{{ line }}</p>
                </div>
            </div>

            <div v-if="graphStats" class="text-xs font-mono text-gray-500 pb-3">
                {{ graphStats }}
            </div>

            <div
                v-if="roots.length && graphNodeCount"
                class="rounded-lg border border-indigo-800/80 bg-indigo-950/30 overflow-hidden mb-6"
            >
                <div class="flex flex-wrap items-center gap-2 border-b border-indigo-800/60 bg-indigo-900/50 px-3 py-2">
                    <span class="text-xs text-gray-500 mr-2">Graph</span>
                    <button
                        type="button"
                        class="rounded-md border border-indigo-700/60 bg-indigo-900 px-2 py-1 text-xs font-mono text-indigo-200 hover:bg-indigo-800/80"
                        @click="fitGraph"
                    >
                        Fit
                    </button>
                    <button
                        type="button"
                        class="rounded-md border border-indigo-700/60 bg-indigo-900 px-2 py-1 text-xs font-mono text-indigo-200 hover:bg-indigo-800/80"
                        @click="resetZoom"
                    >
                        Reset zoom
                    </button>
                    <label class="flex items-center gap-2 text-xs text-gray-500 ml-2">
                        <span>Labels</span>
                        <input v-model="showLabels" type="checkbox" class="rounded border-indigo-600" />
                    </label>
                    <label
                        class="flex min-w-0 flex-[1_1_14rem] max-w-md items-center gap-2 text-xs text-gray-500"
                    >
                        <span class="shrink-0 whitespace-nowrap">Ring spacing</span>
                        <input
                            v-model.number="baseRadiusScale"
                            type="range"
                            min="5"
                            max="8"
                            step="0.1"
                            class="min-w-0 flex-1 accent-indigo-500"
                        />
                        <span class="w-11 shrink-0 font-mono text-indigo-300/90 tabular-nums">{{
                            baseRadiusScale.toFixed(2)
                        }}</span>
                    </label>
                </div>
                <div class="flex flex-wrap gap-4 px-3 py-2 text-xs border-b border-indigo-800/40">
                    <span><span class="inline-block h-2 w-2 rounded-full bg-teal-400 align-middle mr-1"></span> project root</span>
                    <span><span class="inline-block h-2 w-2 rounded-full bg-indigo-400 align-middle mr-1"></span> dependency (deeper = darker; disk radius grows linearly with direct deps, capped)</span>
                    <span class="text-amber-400/90">dashed edge = ambiguous resolution</span>
                    <span class="text-amber-400/90">amber line under the resolved version = <span class="font-mono">[manifest].constraints</span> for that package (uv)</span>
                    <span class="text-gray-500"><span class="font-mono">*</span> after a constraint or <span class="font-mono">==</span> pin = highest semver when several versions exist in the lockfile.</span>
                    <span class="text-gray-500">Arrows point to the depended-on package (parent <span class="font-mono">→</span> dependency).</span>
                    <span class="text-gray-500">Nodes show <span class="font-mono">name</span>, optional <span class="font-mono">[extras]</span>, resolved version, and manifest constraints when listed. Edges show the parent&apos;s specifier range or pin. Hover a line for full detail.</span>
                </div>
                <div ref="graphHost" class="relative w-full min-h-[min(70vh,720px)] h-[70vh]"></div>
            </div>
            <p v-else-if="parsed && !parseError && roots.length === 0" class="text-sm text-amber-200/90 max-w-2xl">
                No project roots found (no <span class="font-mono">source = { virtual = ... }</span> or
                <span class="font-mono">editable = ...</span>). This file may be from
                <span class="font-mono">uv pip compile</span> or similar.
            </p>
            <p v-else-if="parsed && roots.length && !graphNodeCount" class="text-sm text-gray-500 max-w-2xl">
                Roots resolved but no graph nodes (empty trees).
            </p>
        </div>
    </script>

    <script type="module">
        import * as Vue from 'vue';
        import { parse } from 'smol-toml';
        import * as d3 from 'd3';

        function normName(n) {
            return String(n ?? '').toLowerCase();
        }

        function pkgKey(p) {
            return `${normName(p.name)}@${p.version}`;
        }

        function isProjectRoot(p) {
            const s = p.source;
            return s && typeof s === 'object' && ('virtual' in s || 'editable' in s);
        }

        function formatSource(s) {
            if (!s || typeof s !== 'object') return '';
            if (s.registry != null) return `registry ${s.registry}`;
            if (s.virtual != null) return `virtual ${s.virtual}`;
            if (s.editable != null) return `editable ${s.editable}`;
            if (s.git != null) {
                const g = s.git;
                if (g && typeof g === 'object' && g.url) return `git ${g.url}`;
                return `git ${String(g)}`;
            }
            if (s.url != null) return `url ${typeof s.url === 'object' && s.url.url ? s.url.url : s.url}`;
            if (s.path != null) return `path ${s.path}`;
            if (s.directory != null) return `directory ${s.directory}`;
            return '';
        }

        function manifestSpecifiersFor(depName, manifestMap) {
            if (!manifestMap || !depName) return null;
            const arr = manifestMap.get(normName(depName));
            if (!arr || !arr.length) return null;
            return arr.join(', ');
        }

        function collectParentSpecifiersByPackage(packages) {
            const byParent = new Map();
            if (!Array.isArray(packages)) return byParent;
            for (const pkg of packages) {
                const md = pkg.metadata;
                if (!md || typeof md !== 'object') continue;
                const acc = new Map();
                function addRow(row) {
                    if (!row || typeof row !== 'object') return;
                    const n = row.name;
                    if (n == null) return;
                    const spec = row.specifier != null ? String(row.specifier).trim() : '';
                    if (!spec) return;
                    const k = normName(n);
                    if (!acc.has(k)) acc.set(k, []);
                    acc.get(k).push(spec);
                }
                function addArray(arr) {
                    if (!Array.isArray(arr)) return;
                    for (const row of arr) addRow(row);
                }
                addArray(md['requires-dist']);
                const reqDev = md['requires-dev'];
                if (reqDev && typeof reqDev === 'object') {
                    if (Array.isArray(reqDev.dev)) addArray(reqDev.dev);
                }
                if (!acc.size) continue;
                const flat = new Map();
                acc.forEach((specs, k) => {
                    flat.set(k, [...new Set(specs)].join(', '));
                });
                byParent.set(pkgKey(pkg), flat);
            }
            return byParent;
        }

        function metadataSpecifierForDependency(depName, parentPkg, byParentSpecs) {
            if (!parentPkg || !byParentSpecs) return null;
            const inner = byParentSpecs.get(pkgKey(parentPkg));
            if (!inner) return null;
            const s = inner.get(normName(depName));
            return s ? String(s) : null;
        }

        function specifiersForEdge(depName, parentPkg, manifestMap, byParentSpecs) {
            const meta = metadataSpecifierForDependency(depName, parentPkg, byParentSpecs);
            if (meta) return { text: meta, from: 'metadata' };
            const m = manifestSpecifiersFor(depName, manifestMap);
            if (m) return { text: m, from: 'manifest' };
            return null;
        }

        function collectManifestConstraints(data) {
            const m = new Map();
            const man = data.manifest;
            if (!man || typeof man !== 'object') return m;
            const constraints = man.constraints;
            if (!Array.isArray(constraints)) return m;
            for (const c of constraints) {
                if (!c || typeof c !== 'object') continue;
                const n = c.name;
                if (n == null) continue;
                const spec = c.specifier != null ? String(c.specifier).trim() : '';
                const k = normName(n);
                if (!m.has(k)) m.set(k, []);
                if (spec) m.get(k).push(spec);
            }
            return m;
        }

        function resolutionExplanation(
            dep,
            childPkg,
            ambiguous,
            all,
            manifestConstraints,
            parentPkg,
            metadataSpecByParent,
        ) {
            const name = dep.name || '?';
            const parts = [];
            const candidates = all.filter((p) => normName(p.name) === normName(name));
            const nCand = candidates.length;

            const spec = specifiersForEdge(name, parentPkg, manifestConstraints, metadataSpecByParent);
            if (spec) {
                if (spec.from === 'metadata') {
                    parts.push(
                        `${parentPkg?.name ?? '?'} declares ${name} ${spec.text} (from [package.metadata] requires-dist or requires-dev).`,
                    );
                } else {
                    parts.push(
                        `Project manifest constraint(s) for ${name}: ${spec.text} (from [manifest].constraints; apply to resolution for this name).`,
                    );
                }
            }

            if (dep.version) {
                parts.push(`Lockfile pins ${name}==${dep.version}.`);
                if (childPkg && childPkg.version === dep.version) {
                    parts.push('Chosen package matches that pin.');
                }
            } else if (nCand === 1 && childPkg) {
                parts.push(`Only ${name} release in the lockfile (${childPkg.version}).`);
            } else if (dep.source != null && !ambiguous && childPkg) {
                const srcHint = formatSource(dep.source);
                parts.push(
                    `Dependency source ${srcHint || JSON.stringify(dep.source)} matched ${childPkg.version}.`,
                );
            } else if (ambiguous && childPkg) {
                parts.push(
                    `${nCand} versions of ${name} in this lockfile; ==${childPkg.version} was chosen (highest semver among them).`,
                );
            } else if (childPkg) {
                parts.push(
                    `This edge has no version field in the lockfile (uv omits it when the name maps to a single package); the chosen release is ==${childPkg.version}.`,
                );
            }

            if (dep.extra && dep.extra.length) {
                parts.push(
                    `Edge extras: [${dep.extra.join(', ')}] (optional dependency only when these extras are active upstream).`,
                );
            }
            if (dep.marker) {
                parts.push(`Marker: ${dep.marker}`);
            }
            return parts.join(' ');
        }

        function edgeShortLabel(
            dep,
            ambiguous,
            childVersion,
            parentPkg,
            metadataSpecByParent,
        ) {
            const meta = metadataSpecifierForDependency(
                dep.name,
                parentPkg,
                metadataSpecByParent,
            );
            let core;
            if (meta) {
                core = meta;
                if (ambiguous) core = `${core}*`;
            } else if (childVersion) {
                core = `==${childVersion}`;
                if (ambiguous) core = `${core}*`;
            } else if (dep.version) {
                core = `==${dep.version}`;
            } else {
                core = '?';
            }
            const bits = [core];
            if (dep.extra && dep.extra.length) bits.push(`[${dep.extra.join(',')}]`);
            let s = bits.join(' ');
            if (dep.marker) {
                const mk = dep.marker.length > 12 ? `${dep.marker.slice(0, 10)}…` : dep.marker;
                s = `${s} ${mk}`;
            }
            if (s.length > 48) return `${s.slice(0, 46)}…`;
            return s;
        }

        function parsePyVerLabel(label) {
            const m = String(label).match(/^(\d+)\.(\d+)/);
            if (!m) return null;
            return [parseInt(m[1], 10), parseInt(m[2], 10)];
        }

        function parsePyVerFromMarker(s) {
            const m = String(s).match(/^(\d+)\.(\d+)(?:\.(\d+))?/);
            if (!m) return null;
            return [parseInt(m[1], 10), parseInt(m[2], 10), m[3] ? parseInt(m[3], 10) : 0];
        }

        function cmpVerTuple(a, b) {
            for (let i = 0; i < Math.max(a.length, b.length); i += 1) {
                const x = a[i] ?? 0;
                const y = b[i] ?? 0;
                if (x < y) return -1;
                if (x > y) return 1;
            }
            return 0;
        }

        function cmpVerOp(lhs, op, rhs) {
            const c = cmpVerTuple(lhs, rhs);
            if (op === '==') return c === 0;
            if (op === '!=') return c !== 0;
            if (op === '>') return c > 0;
            if (op === '<') return c < 0;
            if (op === '>=') return c >= 0;
            if (op === '<=') return c <= 0;
            return true;
        }

        function evalPythonClause(clause, pyLabel) {
            if (!pyLabel) return true;
            const m = clause.match(/python_version\s*(>=|<=|==|!=|>|<)\s*["']([^"']+)["']/i);
            if (!m) return true;
            const lhs = parsePyVerLabel(pyLabel);
            const rhs = parsePyVerFromMarker(m[2]);
            if (!lhs || !rhs) return true;
            const lhs3 = [lhs[0], lhs[1], 0];
            const rhs3 = [rhs[0], rhs[1], rhs[2] ?? 0];
            return cmpVerOp(lhs3, m[1], rhs3);
        }

        function evalSysPlatformClause(clause, plat) {
            if (!plat) return true;
            const m = clause.match(/sys_platform\s*(==|!=)\s*["']([^"']+)["']/i);
            if (!m) return true;
            const want = m[2].toLowerCase();
            const got = String(plat).toLowerCase();
            if (m[1] === '==') return want === got;
            return want !== got;
        }

        function evalPlatformMachineClause(clause, machine) {
            if (!machine) return true;
            const m = clause.match(/platform_machine\s*(==|!=)\s*["']([^"']+)["']/i);
            if (!m) return true;
            const want = m[2].toLowerCase();
            const got = String(machine).toLowerCase();
            if (m[1] === '==') return want === got;
            return want !== got;
        }

        function activeExtrasSet(activeExtras) {
            if (!activeExtras || !activeExtras.length) return null;
            return new Set(activeExtras.map((x) => String(x).toLowerCase()));
        }

        function markerApplies(markerStr, env, activeExtras) {
            const raw = markerStr != null ? String(markerStr).trim() : '';
            if (!raw) return true;
            const exSet = activeExtrasSet(activeExtras);
            const clauses = raw.split(/\s+and\s+/i).map((x) => x.trim()).filter(Boolean);
            for (const cl of clauses) {
                if (/python_version/i.test(cl)) {
                    if (!env.pythonVersion) continue;
                    if (!evalPythonClause(cl, env.pythonVersion)) return false;
                } else if (/sys_platform/i.test(cl)) {
                    if (!env.sysPlatform) continue;
                    if (!evalSysPlatformClause(cl, env.sysPlatform)) return false;
                } else if (/platform_machine/i.test(cl)) {
                    if (!env.platformMachine) continue;
                    if (!evalPlatformMachineClause(cl, env.platformMachine)) return false;
                } else if (/extra\s*==\s*["']([^"']+)["']/i.test(cl)) {
                    const m = cl.match(/extra\s*==\s*["']([^"']+)["']/i);
                    if (!m) continue;
                    if (!exSet) continue;
                    if (!exSet.has(m[1].toLowerCase())) return false;
                }
            }
            return true;
        }

        function depExtraApplies(dep, activeExtras) {
            const ex = dep.extra;
            if (!ex || !Array.isArray(ex) || ex.length === 0) return true;
            const exSet = activeExtrasSet(activeExtras);
            if (!exSet) return true;
            return ex.some((e) => exSet.has(String(e).toLowerCase()));
        }

        function normalizeDepExtras(ex) {
            if (ex == null) return null;
            if (Array.isArray(ex) && ex.length) return ex.map((e) => String(e));
            return null;
        }

        function childFilterExtras(parentFilterExtras, dep) {
            const edge = normalizeDepExtras(dep.extra);
            if (!edge || !edge.length) return null;
            if (!parentFilterExtras || !parentFilterExtras.length) return edge;
            const ps = new Set(parentFilterExtras.map((x) => String(x).toLowerCase()));
            const narrowed = edge.filter((e) => ps.has(String(e).toLowerCase()));
            return narrowed.length ? narrowed : edge;
        }

        function cmpSemver(a, b) {
            const pa = String(a).split('.').map((x) => parseInt(x, 10) || 0);
            const pb = String(b).split('.').map((x) => parseInt(x, 10) || 0);
            const n = Math.max(pa.length, pb.length);
            for (let i = 0; i < n; i += 1) {
                const x = pa[i] ?? 0;
                const y = pb[i] ?? 0;
                if (x < y) return -1;
                if (x > y) return 1;
            }
            return 0;
        }

        function resolvePkg(all, dep) {
            const n = normName(dep.name);
            const candidates = all.filter((p) => normName(p.name) === n);
            if (candidates.length === 0) return { pkg: null, ambiguous: false };
            if (dep.version) {
                const hit = candidates.find((p) => p.version === dep.version);
                return { pkg: hit ?? null, ambiguous: false };
            }
            if (candidates.length === 1) return { pkg: candidates[0], ambiguous: false };
            if (dep.source != null) {
                const want = JSON.stringify(dep.source);
                const hit = candidates.find((p) => JSON.stringify(p.source) === want);
                if (hit) return { pkg: hit, ambiguous: false };
            }
            const sorted = [...candidates].sort((a, b) => cmpSemver(b.version, a.version));
            return { pkg: sorted[0], ambiguous: true };
        }

        function buildNode(pkg, all, stack, env, filterExtras, displayExtras) {
            const deps = Array.isArray(pkg.dependencies) ? pkg.dependencies : [];
            const edges = [];
            for (const dep of deps) {
                if (!depExtraApplies(dep, filterExtras)) continue;
                if (dep.marker && !markerApplies(dep.marker, env, filterExtras)) continue;
                const { pkg: child, ambiguous } = resolvePkg(all, dep);
                if (!child) {
                    edges.push({ dep, child: null, unresolved: true, circular: false, ambiguous: false });
                    continue;
                }
                const ck = pkgKey(child);
                if (stack.has(ck)) {
                    edges.push({ dep, child: null, unresolved: false, circular: true, ambiguous: false });
                    continue;
                }
                stack.add(ck);
                const sub = buildNode(
                    child,
                    all,
                    stack,
                    env,
                    childFilterExtras(filterExtras, dep),
                    normalizeDepExtras(dep.extra),
                );
                stack.delete(ck);
                edges.push({ dep, child: sub, unresolved: false, circular: false, ambiguous });
            }
            return {
                pkg,
                edges,
                dependencyExtras: displayExtras ?? null,
            };
        }

        function collectRoots(packages, env) {
            const roots = packages.filter(isProjectRoot);
            return roots.map((p) => buildNode(p, packages, new Set([pkgKey(p)]), env, null, null));
        }

        function unionDependencyExtras(a, b) {
            const seen = new Set();
            const out = [];
            function add(arr) {
                if (!arr || !arr.length) return;
                for (const x of arr) {
                    const k = String(x).toLowerCase();
                    if (seen.has(k)) continue;
                    seen.add(k);
                    out.push(String(x));
                }
            }
            add(a);
            add(b);
            return out.length ? out : null;
        }

        function pkgLabelWithExtras(name, extrasDisplay) {
            if (extrasDisplay && extrasDisplay.length) {
                return `${name}[${extrasDisplay.join(', ')}]`;
            }
            return name;
        }

        const NODE_R_MIN = 5;
        const NODE_R_PER_DIRECT_DEP = 3.2;
        const NODE_R_MAX = 34;

        function dependencyNodeStyle(d) {
            const sc = d.subDepCount != null ? d.subDepCount : 0;
            const r = Math.min(
                NODE_R_MAX,
                NODE_R_MIN + sc * NODE_R_PER_DIRECT_DEP,
            );
            if (d.isRoot) {
                return { r, fill: '#2dd4bf', stroke: '#134e4a' };
            }
            const depth = d.depthMin != null ? d.depthMin : 1;
            const t = Math.min(Math.max(depth - 1, 0) / 12, 1);
            const fill = d3.interpolateRgb('#c4b5fd', '#4338ca')(t);
            const stroke = d3.interpolateRgb('#818cf8', '#312e81')(t);
            return { r, fill, stroke };
        }

        const MIN_NODE_CENTER_SEP = 28;

        function minCenterSepForRing(nodeList) {
            let maxR = 11;
            for (const n of nodeList) {
                const r = n.nodeR != null ? n.nodeR : 11;
                if (r > maxR) maxR = r;
            }
            return Math.max(MIN_NODE_CENTER_SEP, 2 * maxR + 4);
        }

        function ringRadiusFloor(baseRadial, count, minSep) {
            if (count <= 0) return baseRadial;
            return Math.max(baseRadial, (count * minSep) / (2 * Math.PI));
        }

        function separateOnRing(nodeList, cx, cy, ringR, minSep) {
            if (nodeList.length < 2 || ringR <= 0) return;
            const minAngle = minSep / ringR;
            const items = nodeList.map((n) => {
                let ang = Math.atan2(n.y - cy, n.x - cx);
                if (ang < 0) ang += 2 * Math.PI;
                return { n, ang };
            });
            items.sort((a, b) => a.ang - b.ang);
            const m = items.length;
            for (let iter = 0; iter < 80; iter += 1) {
                let changed = false;
                for (let i = 0; i < m; i += 1) {
                    const j = (i + 1) % m;
                    let gap;
                    if (j === 0) {
                        gap = items[0].ang + 2 * Math.PI - items[m - 1].ang;
                    } else {
                        gap = items[j].ang - items[i].ang;
                    }
                    if (gap < minAngle) {
                        const need = (minAngle - gap) / 2 + 1e-4;
                        if (j === 0) {
                            items[m - 1].ang -= need;
                            items[0].ang += need;
                        } else {
                            items[i].ang -= need;
                            items[j].ang += need;
                        }
                        changed = true;
                    }
                }
                if (!changed) break;
                items.forEach((it) => {
                    while (it.ang < 0) it.ang += 2 * Math.PI;
                    while (it.ang >= 2 * Math.PI) it.ang -= 2 * Math.PI;
                });
                items.sort((a, b) => a.ang - b.ang);
            }
            items.forEach(({ n, ang }) => {
                let a = ang;
                while (a > Math.PI) a -= 2 * Math.PI;
                while (a < -Math.PI) a += 2 * Math.PI;
                n.x = cx + ringR * Math.cos(a);
                n.y = cy + ringR * Math.sin(a);
            });
        }

        function layoutRadialNearParents(nodes, rawLinks, w, h, radiusScale = 1) {
            const cx = w / 2;
            const cy = h / 2;
            const scale =
                Number.isFinite(radiusScale) && radiusScale > 0 ? radiusScale : 1;
            const nodeById = new Map(nodes.map((n) => [n.id, n]));
            const byDepth = new Map();
            for (const n of nodes) {
                const depth = n.depthMin != null ? n.depthMin : 0;
                if (!byDepth.has(depth)) byDepth.set(depth, []);
                byDepth.get(depth).push(n);
            }
            const maxDepth = byDepth.size ? Math.max(...byDepth.keys()) : 0;
            const minDim = Math.min(w, h);
            const baseR =
                (maxDepth > 0 ? (minDim * 0.38) / maxDepth : minDim * 0.35) * scale;

            const parentsByTarget = new Map();
            for (const l of rawLinks) {
                const t = l.target;
                const s = l.source;
                if (!parentsByTarget.has(t)) parentsByTarget.set(t, []);
                parentsByTarget.get(t).push(s);
            }

            const d0 = byDepth.get(0) || [];
            d0.sort((a, b) => a.id.localeCompare(b.id));
            if (d0.length) {
                const n = d0.length;
                const sep0 = minCenterSepForRing(d0);
                let r0 =
                    n > 1
                        ? Math.max(
                              Math.min(18, baseR * 0.22),
                              ringRadiusFloor(0, n, sep0),
                          )
                        : 0;
                d0.forEach((d, i) => {
                    const angle = (2 * Math.PI * i) / n - Math.PI / 2;
                    d.x = cx + r0 * Math.cos(angle);
                    d.y = cy + r0 * Math.sin(angle);
                });
                if (n > 1 && r0 > 0) {
                    separateOnRing(d0, cx, cy, r0, sep0);
                }
            }

            const d1 = byDepth.get(1) || [];
            d1.sort((a, b) => a.id.localeCompare(b.id));
            if (d1.length) {
                const n = d1.length;
                const sep1 = minCenterSepForRing(d1);
                let ringR = ringRadiusFloor(baseR, n, sep1);
                d1.forEach((d, i) => {
                    const angle = (2 * Math.PI * i) / n - Math.PI / 2;
                    d.x = cx + ringR * Math.cos(angle);
                    d.y = cy + ringR * Math.sin(angle);
                });
                separateOnRing(d1, cx, cy, ringR, sep1);
            }

            for (let depth = 2; depth <= maxDepth; depth += 1) {
                const list = byDepth.get(depth) || [];
                list.sort((a, b) => a.id.localeCompare(b.id));
                const sepRing = minCenterSepForRing(list);
                let ringR = ringRadiusFloor(
                    depth * baseR,
                    list.length,
                    sepRing,
                );
                const byParent = new Map();
                const unassigned = [];

                for (const node of list) {
                    const pids = parentsByTarget.get(node.id) || [];
                    const parents = pids
                        .map((pid) => nodeById.get(pid))
                        .filter((p) => p && p.depthMin === depth - 1);
                    parents.sort((a, b) => a.id.localeCompare(b.id));
                    if (!parents.length) {
                        unassigned.push(node);
                        continue;
                    }
                    const primary = parents[0];
                    if (!byParent.has(primary.id)) byParent.set(primary.id, []);
                    byParent.get(primary.id).push(node);
                }

                for (const [, children] of byParent) {
                    children.sort((a, b) => a.id.localeCompare(b.id));
                }

                for (const [parentId, children] of byParent) {
                    const P = nodeById.get(parentId);
                    if (!P || P.x == null || P.y == null) continue;
                    const thetaP = Math.atan2(P.y - cy, P.x - cx);
                    const k = children.length;
                    const minFan = (k * sepRing) / ringR;
                    const fan = Math.min(
                        Math.PI * 0.5,
                        Math.max(
                            Math.PI / 6 + Math.max(0, k - 1) * 0.2,
                            minFan,
                        ),
                    );
                    children.forEach((node, i) => {
                        const theta =
                            k === 1
                                ? thetaP
                                : thetaP - fan / 2 + (i + 0.5) * (fan / k);
                        node.x = cx + ringR * Math.cos(theta);
                        node.y = cy + ringR * Math.sin(theta);
                    });
                }

                if (unassigned.length) {
                    unassigned.sort((a, b) => a.id.localeCompare(b.id));
                    const un = unassigned.length;
                    unassigned.forEach((node, i) => {
                        const angle = (2 * Math.PI * i) / un - Math.PI / 2;
                        node.x = cx + ringR * Math.cos(angle);
                        node.y = cy + ringR * Math.sin(angle);
                    });
                }

                separateOnRing(list, cx, cy, ringR, sepRing);
            }
        }

        function countOutEdgesBySource(links) {
            const m = new Map();
            for (const l of links) {
                const s = l.source;
                m.set(s, (m.get(s) || 0) + 1);
            }
            return m;
        }

        function flattenTreeToGraph(roots, allPackages, manifestConstraints, metadataSpecByParent) {
            const all = Array.isArray(allPackages) ? allPackages : [];
            const nodes = new Map();
            const edgeMap = new Map();

            function visit(node, depth) {
                const id = pkgKey(node.pkg);
                const existing = nodes.get(id);
                const mergedExtras = unionDependencyExtras(existing?.extrasDisplay, node.dependencyExtras);
                if (!existing) {
                    nodes.set(id, {
                        id,
                        name: node.pkg.name,
                        version: node.pkg.version,
                        isRoot: isProjectRoot(node.pkg),
                        extrasDisplay: mergedExtras,
                        depthMin: depth,
                    });
                } else {
                    existing.extrasDisplay = mergedExtras;
                    existing.depthMin = Math.min(existing.depthMin, depth);
                }
                for (const e of node.edges) {
                    if (!e.child) continue;
                    const tid = pkgKey(e.child.pkg);
                    const k = `${id}->${tid}`;
                    const detail = resolutionExplanation(
                        e.dep,
                        e.child.pkg,
                        e.ambiguous,
                        all,
                        manifestConstraints,
                        node.pkg,
                        metadataSpecByParent,
                    );
                    const short = edgeShortLabel(
                        e.dep,
                        e.ambiguous,
                        e.child.pkg.version,
                        node.pkg,
                        metadataSpecByParent,
                    );
                    if (!edgeMap.has(k)) {
                        edgeMap.set(k, {
                            source: id,
                            target: tid,
                            ambiguous: e.ambiguous,
                            detailFull: detail,
                            shortLabel: short,
                        });
                    } else {
                        const ex = edgeMap.get(k);
                        ex.ambiguous = ex.ambiguous || e.ambiguous;
                        if (ex.detailFull !== detail) {
                            ex.detailFull = `${ex.detailFull}\n---\n${detail}`;
                        }
                        if (ex.shortLabel !== short) {
                            ex.shortLabel = `${ex.shortLabel} | ${short}`;
                            if (ex.shortLabel.length > 44) ex.shortLabel = `${ex.shortLabel.slice(0, 42)}…`;
                        }
                    }
                    visit(e.child, depth + 1);
                }
            }
            roots.forEach((r) => visit(r, 0));
            return { nodes: [...nodes.values()], links: [...edgeMap.values()] };
        }

        const UvLockGraph = {
            template: '#uv-graph-root-tpl',
            setup() {
                const parsed = Vue.ref(false);
                const parseError = Vue.ref('');
                const fileLabel = Vue.ref('');
                const metaLines = Vue.ref([]);
                const roots = Vue.ref([]);
                const packageList = Vue.ref([]);
                const dragOver = Vue.ref(false);
                const globalPythonSelected = Vue.ref('');
                const globalPlatformSelected = Vue.ref('');
                const globalPlatformMachineSelected = Vue.ref('');
                const graphHost = Vue.ref(null);
                const showLabels = Vue.ref(true);
                const baseRadiusScale = Vue.ref(5);
                const manifestConstraints = Vue.ref(null);
                const metadataSpecByParent = Vue.ref(null);

                const graphNodeCount = Vue.computed(() => {
                    if (!roots.value.length) return 0;
                    return flattenTreeToGraph(
                        roots.value,
                        packageList.value,
                        manifestConstraints.value,
                        metadataSpecByParent.value,
                    ).nodes.length;
                });

                const graphStats = Vue.computed(() => {
                    if (!roots.value.length) return '';
                    const g = flattenTreeToGraph(
                        roots.value,
                        packageList.value,
                        manifestConstraints.value,
                        metadataSpecByParent.value,
                    );
                    return `nodes: ${g.nodes.length}  edges: ${g.links.length}`;
                });

                const metaLine = Vue.computed(() => metaLines.value.length > 0);

                function rebuildRoots() {
                    const pkgs = packageList.value;
                    if (!pkgs.length) {
                        roots.value = [];
                        return;
                    }
                    const env = {
                        pythonVersion: globalPythonSelected.value.trim() || null,
                        sysPlatform: globalPlatformSelected.value.trim() || null,
                        platformMachine: globalPlatformMachineSelected.value.trim() || null,
                    };
                    roots.value = collectRoots(pkgs, env);
                }

                function applyLockText(text, name) {
                    parseError.value = '';
                    roots.value = [];
                    packageList.value = [];
                    metaLines.value = [];
                    parsed.value = false;
                    manifestConstraints.value = null;
                    metadataSpecByParent.value = null;
                    try {
                        const data = parse(text);
                        parsed.value = true;
                        const packages = Array.isArray(data.package) ? data.package : [];
                        const mc = collectManifestConstraints(data);
                        manifestConstraints.value = mc.size ? mc : null;
                        const pb = collectParentSpecifiersByPackage(packages);
                        metadataSpecByParent.value = pb.size ? pb : null;
                        const lines = [];
                        if (data['requires-python'] != null) {
                            lines.push(`requires-python: ${data['requires-python']}`);
                        }
                        if (data.version != null) lines.push(`lock version: ${data.version}`);
                        if (data.revision != null) lines.push(`revision: ${data.revision}`);
                        lines.push(`packages: ${packages.length}`);
                        if (mc.size) {
                            let n = 0;
                            mc.forEach((specs) => {
                                n += specs.length;
                            });
                            lines.push(`manifest constraints: ${n} (unique packages: ${mc.size})`);
                        }
                        if (pb.size) {
                            let n = 0;
                            pb.forEach((inner) => {
                                n += inner.size;
                            });
                            lines.push(
                                `metadata specifiers: ${n} (requires-dist / requires-dev across ${pb.size} packages)`,
                            );
                        }
                        metaLines.value = lines;
                        packageList.value = packages;
                        rebuildRoots();
                    } catch (err) {
                        parseError.value = err.message || String(err);
                        parsed.value = false;
                        roots.value = [];
                        manifestConstraints.value = null;
                        metadataSpecByParent.value = null;
                    }
                    if (name) fileLabel.value = name;
                }

                const onFile = (e) => {
                    const f = e.target.files && e.target.files[0];
                    if (!f) return;
                    const reader = new FileReader();
                    reader.onload = () => applyLockText(String(reader.result || ''), f.name);
                    reader.onerror = () => {
                        parseError.value = 'Could not read file.';
                        parsed.value = false;
                    };
                    reader.readAsText(f, 'utf-8');
                };

                const onDrop = (e) => {
                    dragOver.value = false;
                    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
                    if (!f) return;
                    const reader = new FileReader();
                    reader.onload = () => applyLockText(String(reader.result || ''), f.name);
                    reader.onerror = () => {
                        parseError.value = 'Could not read file.';
                        parsed.value = false;
                    };
                    reader.readAsText(f, 'utf-8');
                };

                let zoomBehavior = null;
                let fitFn = null;
                let resetFn = null;
                let labelStyleFn = null;

                function stopGraph() {
                    labelStyleFn = null;
                    const el = graphHost.value;
                    if (el) {
                        el.innerHTML = '';
                    }
                    zoomBehavior = null;
                    fitFn = null;
                    resetFn = null;
                }

                function runGraph() {
                    stopGraph();
                    const el = graphHost.value;
                    if (!el || !roots.value.length) return;

                    const { nodes: rawNodes, links: rawLinks } = flattenTreeToGraph(
                        roots.value,
                        packageList.value,
                        manifestConstraints.value,
                        metadataSpecByParent.value,
                    );
                    if (!rawNodes.length) return;

                    const w = el.clientWidth || 800;
                    const h = el.clientHeight || 480;

                    const outBySource = countOutEdgesBySource(rawLinks);
                    const mc = manifestConstraints.value;
                    const nodes = rawNodes.map((n) => {
                        const subDepCount = outBySource.get(n.id) ?? 0;
                        const vis = dependencyNodeStyle({ ...n, subDepCount });
                        const manifestConstraintText = mc
                            ? manifestSpecifiersFor(n.name, mc)
                            : null;
                        return {
                            ...n,
                            subDepCount,
                            manifestConstraintText,
                            nodeR: vis.r,
                            nodeFill: vis.fill,
                            nodeStroke: vis.stroke,
                        };
                    });
                    layoutRadialNearParents(nodes, rawLinks, w, h, baseRadiusScale.value);

                    const nodeById = new Map(nodes.map((n) => [n.id, n]));
                    const links = rawLinks
                        .map((l) => {
                            const s = nodeById.get(l.source);
                            const t = nodeById.get(l.target);
                            if (!s || !t) return null;
                            return {
                                source: s,
                                target: t,
                                ambiguous: l.ambiguous,
                                detailFull: l.detailFull,
                                shortLabel: l.shortLabel,
                            };
                        })
                        .filter(Boolean);

                    const svg = d3
                        .select(el)
                        .append('svg')
                        .attr('width', '100%')
                        .attr('height', '100%')
                        .attr('viewBox', [0, 0, w, h])
                        .attr('class', 'touch-none');

                    const gRoot = svg.append('g');

                    const zoomed = (event) => {
                        gRoot.attr('transform', event.transform);
                    };
                    zoomBehavior = d3.zoom().scaleExtent([0.15, 8]).on('zoom', zoomed);
                    svg.call(zoomBehavior);

                    svg.append('defs')
                        .append('marker')
                        .attr('id', 'uv-graph-arrow-dep')
                        .attr('viewBox', '0 0 10 10')
                        .attr('refX', 10)
                        .attr('refY', 5)
                        .attr('markerWidth', 7)
                        .attr('markerHeight', 7)
                        .attr('orient', 'auto')
                        .append('path')
                        .attr('d', 'M0,0 L10,5 L0,10 z')
                        .attr('fill', '#818cf8')
                        .attr('fill-opacity', 0.95);

                    const linkG = gRoot
                        .append('g')
                        .attr('class', 'graph-links')
                        .selectAll('g')
                        .data(links)
                        .join('g');

                    linkG
                        .append('line')
                        .attr('stroke', '#6366f1')
                        .attr('stroke-opacity', 0.55)
                        .attr('stroke-width', 1.4)
                        .attr('stroke-dasharray', (d) => (d.ambiguous ? '6 4' : null))
                        .attr('marker-end', 'url(#uv-graph-arrow-dep)');

                    linkG.append('title').text((d) => d.detailFull);

                    const edgeLabels = linkG
                        .append('text')
                        .attr('font-size', 8)
                        .attr('fill', '#c4b5fd')
                        .attr('font-family', 'ui-monospace, monospace')
                        .attr('text-anchor', 'middle')
                        .attr('pointer-events', 'none')
                        .text((d) => d.shortLabel);

                    const node = gRoot
                        .append('g')
                        .attr('class', 'graph-nodes')
                        .selectAll('g')
                        .data(nodes)
                        .join('g');

                    node
                        .append('circle')
                        .attr('r', (d) => d.nodeR)
                        .attr('fill', (d) => d.nodeFill)
                        .attr('stroke', (d) => d.nodeStroke)
                        .attr('stroke-width', 1.5);

                    node.append('text')
                        .attr('class', 'graph-node-dep-count')
                        .attr('text-anchor', 'middle')
                        .attr('dominant-baseline', 'central')
                        .attr('y', 0)
                        .attr('fill', '#0f172a')
                        .attr('font-weight', 600)
                        .attr('font-family', 'ui-monospace, monospace')
                        .attr('font-size', (d) => {
                            const n = d.subDepCount != null ? d.subDepCount : 0;
                            if (n <= 0) return 8;
                            const digits = String(n).length;
                            const scale = digits > 2 ? 0.38 : 0.52;
                            return Math.max(7, Math.min(15, d.nodeR * scale));
                        })
                        .style('pointer-events', 'none')
                        .text((d) => {
                            const n = d.subDepCount != null ? d.subDepCount : 0;
                            return n > 0 ? String(n) : '';
                        });

                    const labels = node
                        .append('text')
                        .attr('text-anchor', 'middle')
                        .attr('y', (d) => d.nodeR + 4)
                        .attr('fill', '#a5b4fc')
                        .attr('font-family', 'ui-monospace, monospace')
                        .style('pointer-events', 'none');

                    labels.each(function appendNodeLabel(d) {
                        const t = d3.select(this);
                        t.append('tspan')
                            .attr('x', 0)
                            .attr('dy', 0)
                            .attr('font-size', 10)
                            .style(
                                'text-shadow',
                                '0 0 2px #0f172a, 0 0 5px #0f172a, 0 1px 3px rgba(15,23,42,0.85)',
                            )
                            .text(d.name);
                        if (d.extrasDisplay && d.extrasDisplay.length) {
                            t.append('tspan')
                                .attr('font-size', 9)
                                .attr('fill', '#a5b4fc')
                                .text(`[${d.extrasDisplay.join(', ')}]`);
                        }
                        t.append('tspan')
                            .attr('x', 0)
                            .attr('dy', '1.05em')
                            .attr('font-size', 8)
                            .attr('fill', '#94a3b8')
                            .text(String(d.version ?? ''));
                        if (d.manifestConstraintText) {
                            t.append('tspan')
                                .attr('x', 0)
                                .attr('dy', '1.05em')
                                .attr('font-size', 7)
                                .attr('fill', '#fbbf24')
                                .style(
                                    'text-shadow',
                                    '0 0 2px #0f172a, 0 1px 2px rgba(15,23,42,0.85)',
                                )
                                .text(d.manifestConstraintText);
                        }
                    });

                    node.append('title').text((d) => {
                        const base = `${pkgLabelWithExtras(d.name, d.extrasDisplay)} ${d.version}`;
                        const sd = d.subDepCount != null ? d.subDepCount : 0;
                        const deps = `direct deps in graph: ${sd}`;
                        const man = d.manifestConstraintText
                            ? ` ${d.manifestConstraintText}`
                            : '';
                        if (d.isRoot) return `${base} (${deps})${man}`;
                        return `${base} (depth ${d.depthMin}, ${deps})${man}`;
                    });

                    function drawRadial() {
                        linkG.each(function tickLink(d) {
                            const g = d3.select(this);
                            const sx = d.source.x;
                            const sy = d.source.y;
                            const tx = d.target.x;
                            const ty = d.target.y;
                            const dx = tx - sx;
                            const dy = ty - sy;
                            const len = Math.hypot(dx, dy) || 1;
                            const ux = dx / len;
                            const uy = dy / len;
                            const rs = d.source.nodeR ?? 12;
                            const rt = d.target.nodeR ?? 12;
                            let x1 = sx;
                            let y1 = sy;
                            let x2 = tx;
                            let y2 = ty;
                            if (len > rs + rt + 2) {
                                x1 = sx + ux * rs;
                                y1 = sy + uy * rs;
                                x2 = tx - ux * rt;
                                y2 = ty - uy * rt;
                            }
                            g.select('line')
                                .attr('x1', x1)
                                .attr('y1', y1)
                                .attr('x2', x2)
                                .attr('y2', y2);
                            const mx = (x1 + x2) / 2;
                            const my = (y1 + y2) / 2;
                            const segLen = Math.hypot(x2 - x1, y2 - y1) || 1;
                            const ox = (-(y2 - y1) / segLen) * 12;
                            const oy = ((x2 - x1) / segLen) * 12;
                            g.select('text').attr('x', mx + ox).attr('y', my + oy);
                        });

                        node.attr('transform', (d) => `translate(${d.x},${d.y})`);
                    }
                    drawRadial();

                    const doFit = () => {
                        const pad = 40;
                        let xMin = Infinity;
                        let xMax = -Infinity;
                        let yMin = Infinity;
                        let yMax = -Infinity;
                        for (const d of nodes) {
                            if (d.x == null || d.y == null) continue;
                            xMin = Math.min(xMin, d.x);
                            xMax = Math.max(xMax, d.x);
                            yMin = Math.min(yMin, d.y);
                            yMax = Math.max(yMax, d.y);
                        }
                        if (!Number.isFinite(xMin)) return;
                        const bw = xMax - xMin || 1;
                        const bh = yMax - yMin || 1;
                        const cw = el.clientWidth || w;
                        const ch = el.clientHeight || h;
                        const k = Math.min(cw / (bw + pad * 2), ch / (bh + pad * 2), 2);
                        const tx = cw / 2 - k * ((xMin + xMax) / 2);
                        const ty = ch / 2 - k * ((yMin + yMax) / 2);
                        svg.transition().duration(300).call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
                    };

                    const doReset = () => {
                        svg.transition().duration(200).call(zoomBehavior.transform, d3.zoomIdentity);
                    };

                    fitFn = doFit;
                    resetFn = doReset;

                    doFit();

                    labelStyleFn = () => {
                        const v = showLabels.value ? 1 : 0;
                        labels.style('opacity', v);
                        edgeLabels.style('opacity', v);
                    };
                    labelStyleFn();
                }

                Vue.watch(showLabels, () => {
                    if (labelStyleFn) labelStyleFn();
                });

                Vue.watch(
                    roots,
                    () => {
                        Vue.nextTick(() => {
                            runGraph();
                        });
                    },
                );

                Vue.watch(baseRadiusScale, () => {
                    Vue.nextTick(() => runGraph());
                });

                Vue.onMounted(() => {
                    Vue.nextTick(() => runGraph());
                });

                Vue.onBeforeUnmount(() => {
                    stopGraph();
                });

                const fitGraph = () => {
                    if (fitFn) fitFn();
                };

                const resetZoom = () => {
                    if (resetFn) resetFn();
                };

                return {
                    parsed,
                    parseError,
                    fileLabel,
                    metaLines,
                    metaLine,
                    roots,
                    packageList,
                    onFile,
                    onDrop,
                    dragOver,
                    graphHost,
                    graphNodeCount,
                    graphStats,
                    showLabels,
                    baseRadiusScale,
                    fitGraph,
                    resetZoom,
                };
            },
        };

        Vue.createApp({
            components: { UvLockGraph },
        }).mount('#app');
    </script>
</body>
</html>
